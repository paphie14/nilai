<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nilai Ekskul & Program Unggulan</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    background:#0d1117;
    color:#c9d1d9;
    font-family:Arial, Helvetica, sans-serif;
    line-height:1.5;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
}

.repo-box{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
}

/* HEADER */

.header-box{
    max-width:850px;
    margin:0 auto 35px auto;
    padding:0 20px 25px;
    border-bottom:1px solid #30363d;
}

.main-title{
    color:#58a6ff;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    line-height:1.4;
}

.sub-title{
    color:#f0f6fc;
    text-align:center;
    font-size:22px;
    margin-top:10px;
}

/* 3 KOLOM */

.content-wrapper{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

.column-box{
    background:#21262d;
    border:1px solid #30363d;
    border-radius:10px;
    padding:18px;
}

.section-title{
    color:#ffffff;
    border-bottom:1px solid #30363d;
    padding-bottom:10px;
    margin-bottom:18px;
    font-size:22px;
    font-weight:bold;
}

.menu-link{
    display:block;
    width:100%;
    padding:14px 16px;
    margin-bottom:10px;

    background:#161b22;
    border:1px solid #30363d;
    border-radius:8px;

    color:#58a6ff;
    text-decoration:none;
    font-size:17px;

    transition:0.2s;
}

.menu-link:hover{
    background:#30363d;
    color:#79c0ff;
    transform:translateX(3px);
}

.info-list{
    padding-left:20px;
}

.info-list li{
    margin-bottom:12px;
}

footer{
    margin-top:30px;
    text-align:center;
    color:#8b949e;
    font-size:14px;
}

@media (max-width:900px){

    .content-wrapper{
        grid-template-columns:1fr;
    }

    .main-title{
        font-size:22px;
    }

    .sub-title{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="repo-box">

    <div class="header-box">

        <div class="main-title" id="main-title">
            Loading...
        </div>

        <div class="sub-title" id="sub-title">
            Loading...
        </div>

    </div>

    <div class="content-wrapper">

        <!-- KIRI -->

        <div class="column-box">

            <div class="section-title">
                ⚠ PENTING!
            </div>

            <ol class="info-list" id="info-container"></ol>

        </div>

        <!-- TENGAH -->

        <div class="column-box">

            <div class="section-title">
                EKSTRAKURIKULER
            </div>

            <div id="ekskul-container"></div>

        </div>

        <!-- KANAN -->

        <div class="column-box">

            <div class="section-title">
                PROGRAM UNGGULAN
            </div>

            <div id="progu-container"></div>

            <div class="section-title" style="margin-top:30px;">
                STUDENT OF THE MONTH
            </div>

            <div id="student-container"></div>

        </div>

    </div>

    <footer>
        © 2025 SD Islam Cikal Harapan II
    </footer>

</div>

</div>

<script>

/* HEADER */

fetch('header.json')
.then(r => r.json())
.then(data => {

    document.getElementById('main-title')
        .textContent = data.judul;

    document.getElementById('sub-title')
        .innerHTML =
            data.subjudul + "<br>" + data.tahun;

});

/* INFO */

fetch('info.json')
.then(r => r.json())
.then(data => {

    const container =
        document.getElementById('info-container');

    data.forEach(item => {

        const li =
            document.createElement('li');

        li.textContent = item;

        container.appendChild(li);

    });

});

/* ESKUL */

fetch('ekskul.json')
.then(r => r.json())
.then(data => {

    const container =
        document.getElementById('ekskul-container');

    data.forEach(item => {

        const link =
            document.createElement('a');

        link.className = 'menu-link';
        link.href = item.url;
        link.target = '_blank';
        link.textContent = item.nama;

        container.appendChild(link);

    });

});

/* PROGU */

fetch('progu.json')
.then(r => r.json())
.then(data => {

    const container =
        document.getElementById('progu-container');

    data.forEach(item => {

        const link =
            document.createElement('a');

        link.className = 'menu-link';
        link.href = item.url;
        link.target = '_blank';
        link.textContent = item.nama;

        container.appendChild(link);

    });

});

/* STUDENT OF THE MONTH */

fetch('student.json')
.then(r => r.json())
.then(data => {

    const container =
        document.getElementById('student-container');

    const link =
        document.createElement('a');

    link.className = 'menu-link';
    link.href = data.url;
    link.target = '_blank';
    link.textContent = data.nama;

    container.appendChild(link);

});

</script>

</body>
</html>
